name: Lisdo
options:
  bundleIdPrefix: com.yiwenwu
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: WDAN6HW5VM
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "5"
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
packages:
  LisdoCore:
    path: Packages/LisdoCore
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.1
targets:
  LisdoiOS:
    type: application
    platform: iOS
    productName: Lisdo
    deploymentTarget: "17.0"
    attributes:
      SystemCapabilities:
        com.apple.InAppPurchase:
          enabled: 1
    sources:
      - path: Apps/iOS
      - path: Apps/Shared
      - path: Extensions/Shared
    info:
      path: Apps/iOS/Info.plist
      properties:
        CFBundleDisplayName: Lisdo
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSCameraUsageDescription: Lisdo uses the camera to capture notes, screenshots, and documents so they can become reviewable task drafts.
        NSMicrophoneUsageDescription: Lisdo records voice captures so you can review the transcript before creating a task draft.
        NSSpeechRecognitionUsageDescription: Lisdo uses speech recognition to turn voice captures into transcripts for draft review.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        UILaunchStoryboardName: LaunchScreen
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: Apps/iOS/LisdoiOS.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.yiwenwu.Lisdo
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.applesignin:
          - Default
        keychain-access-groups:
          - "$(AppIdentifierPrefix)com.yiwenwu.Lisdo.shared"
        com.apple.security.application-groups:
          - group.com.yiwenwu.Lisdo
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.yiwenwu.Lisdo
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
    dependencies:
      - package: LisdoCore
        product: LisdoCore
      - sdk: ActivityKit.framework
      - sdk: AppIntents.framework
      - sdk: AuthenticationServices.framework
      - sdk: AVFoundation.framework
      - sdk: PhotosUI.framework
      - sdk: Speech.framework
      - sdk: StoreKit.framework
      - sdk: Vision.framework
      - target: LisdoWidgetsExtension
        embed: true
      - target: LisdoShareExtension
        embed: true

  LisdoMac:
    type: application
    platform: macOS
    productName: Lisdo
    deploymentTarget: "14.0"
    sources:
      - path: Apps/macOS
      - path: Apps/Shared
    info:
      path: Apps/macOS/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSMicrophoneUsageDescription: Lisdo records voice captures so you can review the transcript before creating a task draft.
        NSSpeechRecognitionUsageDescription: Lisdo uses speech recognition to turn voice captures into transcripts for draft review.
        ITSAppUsesNonExemptEncryption: false
        SUFeedURL: https://lisdo.robertw.me/appcast.xml
        SUPublicEDKey: $(LISDO_SPARKLE_PUBLIC_ED_KEY)
        SUEnableAutomaticChecks: true
        SUAutomaticallyUpdate: true
        SUAllowsAutomaticUpdates: true
        SUEnableInstallerLauncherService: true
    entitlements:
      path: Apps/macOS/LisdoMac.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.yiwenwu.Lisdo
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.applesignin:
          - Default
        keychain-access-groups:
          - "$(AppIdentifierPrefix)com.yiwenwu.Lisdo.shared"
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.yiwenwu.Lisdo
        com.apple.security.device.audio-input: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.temporary-exception.mach-lookup.global-name:
          - $(PRODUCT_BUNDLE_IDENTIFIER)-spks
          - $(PRODUCT_BUNDLE_IDENTIFIER)-spki
        com.apple.security.network.client: true
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.yiwenwu.Lisdo.macOS
        PRODUCT_NAME: Lisdo
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        LISDO_SPARKLE_PUBLIC_ED_KEY: ""
    dependencies:
      - package: LisdoCore
        product: LisdoCore
      - package: Sparkle
        product: Sparkle
      - sdk: AVFoundation.framework
      - sdk: AuthenticationServices.framework
      - sdk: Carbon.framework
      - sdk: ScreenCaptureKit.framework
      - sdk: Speech.framework
      - sdk: StoreKit.framework
      - sdk: UniformTypeIdentifiers.framework
      - sdk: Vision.framework

  LisdoWidgetsExtension:
    type: app-extension
    platform: iOS
    productName: LisdoWidgetsExtension
    deploymentTarget: "17.0"
    sources:
      - path: Extensions/Widgets
      - path: Extensions/Shared
    info:
      path: Extensions/Widgets/Info.plist
      properties:
        CFBundleDisplayName: Lisdo
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Extensions/Widgets/LisdoWidgets.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.yiwenwu.Lisdo
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.security.application-groups:
          - group.com.yiwenwu.Lisdo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yiwenwu.Lisdo.widgets
        TARGETED_DEVICE_FAMILY: "1,2"
        APPLICATION_EXTENSION_API_ONLY: "YES"
    dependencies:
      - package: LisdoCore
        product: LisdoCore
      - sdk: ActivityKit.framework
      - sdk: AppIntents.framework
      - sdk: WidgetKit.framework

  LisdoShareExtension:
    type: app-extension
    platform: iOS
    productName: LisdoShareExtension
    deploymentTarget: "17.0"
    sources:
      - path: Extensions/Share/ShareViewController.swift
      - path: Extensions/Share/PrivacyInfo.xcprivacy
    info:
      path: Extensions/Share/Info.plist
      properties:
        CFBundleDisplayName: Lisdo
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsFileWithMaxCount: 10
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 10
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
    entitlements:
      path: Extensions/Share/LisdoShare.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.yiwenwu.Lisdo
        com.apple.developer.icloud-services:
          - CloudKit
        keychain-access-groups:
          - "$(AppIdentifierPrefix)com.yiwenwu.Lisdo.shared"
        com.apple.security.application-groups:
          - group.com.yiwenwu.Lisdo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yiwenwu.Lisdo.share
        TARGETED_DEVICE_FAMILY: "1,2"
        APPLICATION_EXTENSION_API_ONLY: "YES"
    dependencies:
      - package: LisdoCore
        product: LisdoCore
      - sdk: UniformTypeIdentifiers.framework
      - sdk: Vision.framework

schemes:
  LisdoiOS:
    build:
      targets:
        LisdoiOS: all
    run:
      config: Debug
      storeKitConfiguration: Configs/Lisdo.storekit
  LisdoMac:
    build:
      targets:
        LisdoMac: all
    run:
      config: Debug
  LisdoWidgetsExtension:
    build:
      targets:
        LisdoWidgetsExtension: all
  LisdoShareExtension:
    build:
      targets:
        LisdoShareExtension: all
