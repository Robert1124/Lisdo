name: macOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  macos-release:
    name: Build, sign, notarize, and publish macOS release
    runs-on: macos-15-intel
    env:
      RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
      DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
      DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
      DEVELOPER_ID_PROVISIONING_PROFILE_BASE64: ${{ secrets.DEVELOPER_ID_PROVISIONING_PROFILE_BASE64 }}
      NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
      NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
      NOTARY_PRIVATE_KEY_BASE64: ${{ secrets.NOTARY_PRIVATE_KEY_BASE64 }}
      SPARKLE_PRIVATE_ED_KEY_BASE64: ${{ secrets.SPARKLE_PRIVATE_ED_KEY_BASE64 }}
      LISDO_SPARKLE_PUBLIC_ED_KEY: ${{ secrets.LISDO_SPARKLE_PUBLIC_ED_KEY }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate release inputs and secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_VERSION" =~ ^v[0-9]+(\.[0-9]+){1,2}$ ]]; then
            echo "Release version must look like v0.1.0; got '$RELEASE_VERSION'." >&2
            exit 64
          fi

          missing=()
          for name in \
            APPLE_TEAM_ID \
            DEVELOPER_ID_APPLICATION \
            DEVELOPER_ID_CERTIFICATE_BASE64 \
            DEVELOPER_ID_CERTIFICATE_PASSWORD \
            DEVELOPER_ID_PROVISIONING_PROFILE_BASE64 \
            NOTARY_KEY_ID \
            NOTARY_ISSUER_ID \
            NOTARY_PRIVATE_KEY_BASE64 \
            SPARKLE_PRIVATE_ED_KEY_BASE64 \
            LISDO_SPARKLE_PUBLIC_ED_KEY
          do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if [[ "${#missing[@]}" -gt 0 ]]; then
            printf 'Missing required release secret(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Install XcodeGen
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Select Xcode 26
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          xcode_apps=(/Applications/Xcode_26*.app /Applications/Xcode.app)
          selected_developer_dir=""
          for ((idx=${#xcode_apps[@]} - 1; idx >= 0; idx--)); do
            candidate="${xcode_apps[$idx]}"
            developer_dir="$candidate/Contents/Developer"
            if [[ ! -d "$developer_dir" ]]; then
              continue
            fi

            version="$(DEVELOPER_DIR="$developer_dir" xcodebuild -version | awk 'NR == 1 {print $2}')"
            if [[ "$version" == 26.* ]]; then
              selected_developer_dir="$developer_dir"
              break
            fi
          done

          if [[ -z "$selected_developer_dir" ]]; then
            echo "No Xcode 26 installation was found on this runner." >&2
            ls -1d /Applications/Xcode*.app 2>/dev/null || true
            exit 1
          fi

          sudo xcode-select -s "$selected_developer_dir"
          xcodebuild -version
          sdk_version="$(xcrun --sdk macosx --show-sdk-version)"
          echo "Selected macOS SDK $sdk_version"
          if [[ "$sdk_version" != 26.* ]]; then
            echo "Expected a macOS 26 SDK after selecting Xcode 26, got $sdk_version." >&2
            exit 1
          fi

      - name: Import Developer ID certificate
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/lisdo-release.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          base64 --decode <<< "$DEVELOPER_ID_CERTIFICATE_BASE64" > "$RUNNER_TEMP/developer-id.p12"
          security import "$RUNNER_TEMP/developer-id.p12" -k "$KEYCHAIN_PATH" -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install Developer ID provisioning profile
        shell: bash
        run: |
          set -euo pipefail
          PROFILE_PATH="$RUNNER_TEMP/LisdoMac.provisionprofile"
          base64 --decode <<< "$DEVELOPER_ID_PROVISIONING_PROFILE_BASE64" > "$PROFILE_PATH"
          PROFILE_PLIST="$RUNNER_TEMP/LisdoMacProfile.plist"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID="$(plutil -extract UUID raw -o - "$PROFILE_PLIST")"
          PROFILE_NAME="$(plutil -extract Name raw -o - "$PROFILE_PLIST")"
          PROFILE_APP_ID="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.application-identifier' "$PROFILE_PLIST")"
          if [[ "$PROFILE_APP_ID" != "$APPLE_TEAM_ID.com.yiwenwu.Lisdo.macOS" ]]; then
            echo "Developer ID profile is for '$PROFILE_APP_ID', expected '$APPLE_TEAM_ID.com.yiwenwu.Lisdo.macOS'." >&2
            exit 1
          fi
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.provisionprofile"
          printf 'LISDO_MAC_PROFILE_SPECIFIER=%s\n' "$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed Developer ID provisioning profile $PROFILE_NAME ($PROFILE_UUID)."

      - name: Prepare notarization key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/notary"
          base64 --decode <<< "$NOTARY_PRIVATE_KEY_BASE64" > "$RUNNER_TEMP/notary/AuthKey_${NOTARY_KEY_ID}.p8"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run core tests
        run: swift test --package-path Packages/LisdoCore

      - name: Build macOS archive
        shell: bash
        run: |
          set -euo pipefail
          APP_VERSION="${RELEASE_VERSION#v}"
          DIST_DIR="$PWD/dist"
          DERIVED_DATA_PATH="$DIST_DIR/DerivedData"
          ARCHIVE_PATH="$DIST_DIR/archive/Lisdo-${APP_VERSION}.xcarchive"
          rm -rf "$PWD/dist"
          mkdir -p "$DIST_DIR/archive" "$DERIVED_DATA_PATH"

          xcodebuild \
            -project Lisdo.xcodeproj \
            -scheme LisdoMac \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            archive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$DEVELOPER_ID_APPLICATION" \
            PROVISIONING_PROFILE_SPECIFIER="$LISDO_MAC_PROFILE_SPECIFIER" \
            MARKETING_VERSION="$APP_VERSION" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            LISDO_SPARKLE_PUBLIC_ED_KEY="$LISDO_SPARKLE_PUBLIC_ED_KEY" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime"

          ARCHIVED_APP="$(find "$ARCHIVE_PATH/Products/Applications" -maxdepth 1 -name "*.app" -print -quit)"
          if [[ -z "$ARCHIVED_APP" ]]; then
            echo "No archived app bundle found under $ARCHIVE_PATH/Products/Applications." >&2
            exit 1
          fi
          /usr/bin/ditto "$ARCHIVED_APP" "$PWD/dist/Lisdo.app"
          /usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$PWD/dist/Lisdo.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$PWD/dist/Lisdo.app/Contents/Info.plist"
          archived_public_ed_key="$(/usr/libexec/PlistBuddy -c 'Print :SUPublicEDKey' "$PWD/dist/Lisdo.app/Contents/Info.plist")"
          if [[ "$archived_public_ed_key" != "$LISDO_SPARKLE_PUBLIC_ED_KEY" ]]; then
            echo "Archived app SUPublicEDKey does not match LISDO_SPARKLE_PUBLIC_ED_KEY." >&2
            exit 1
          fi

      - name: Re-sign Sparkle framework for Developer ID notarization
        shell: bash
        run: |
          set -euo pipefail
          APP="dist/Lisdo.app"
          SPARKLE_FRAMEWORK="$APP/Contents/Frameworks/Sparkle.framework"
          if [[ ! -d "$SPARKLE_FRAMEWORK" ]]; then
            echo "Sparkle.framework was not embedded in $APP." >&2
            exit 1
          fi

          sign_preserving_entitlements() {
            local item="$1"
            local entitlements="$RUNNER_TEMP/$(basename "$item").entitlements.plist"
            if codesign -d --entitlements :- "$item" > "$entitlements" 2>/dev/null \
              && plutil -lint "$entitlements" >/dev/null 2>&1; then
              codesign --force --timestamp --options runtime \
                --entitlements "$entitlements" \
                --sign "$DEVELOPER_ID_APPLICATION" \
                "$item"
            else
              codesign --force --timestamp --options runtime \
                --sign "$DEVELOPER_ID_APPLICATION" \
                "$item"
            fi
          }

          sign_preserving_entitlements "$SPARKLE_FRAMEWORK/Versions/B/XPCServices/Downloader.xpc"
          sign_preserving_entitlements "$SPARKLE_FRAMEWORK/Versions/B/XPCServices/Installer.xpc"
          sign_preserving_entitlements "$SPARKLE_FRAMEWORK/Versions/B/Updater.app"
          sign_preserving_entitlements "$SPARKLE_FRAMEWORK/Versions/B/Autoupdate"
          sign_preserving_entitlements "$SPARKLE_FRAMEWORK"
          sign_preserving_entitlements "$APP"

          codesign --verify --strict --deep "$APP"
          for nested_item in \
            "$SPARKLE_FRAMEWORK/Versions/B/Updater.app" \
            "$SPARKLE_FRAMEWORK/Versions/B/Autoupdate" \
            "$SPARKLE_FRAMEWORK/Versions/B/XPCServices/Downloader.xpc" \
            "$SPARKLE_FRAMEWORK/Versions/B/XPCServices/Installer.xpc"
          do
            codesign -dv --verbose=4 "$nested_item" 2>&1 | tee "$RUNNER_TEMP/$(basename "$nested_item").codesign.txt"
            grep -q 'Authority=Developer ID Application:' "$RUNNER_TEMP/$(basename "$nested_item").codesign.txt"
            grep -q 'Timestamp=' "$RUNNER_TEMP/$(basename "$nested_item").codesign.txt"
          done

      - name: Validate Developer ID app bundle
        shell: bash
        run: |
          set -euo pipefail
          APP="dist/Lisdo.app"
          codesign --verify --strict --deep "$APP"
          codesign -dv --verbose=4 "$APP" 2>&1 | tee "$RUNNER_TEMP/lisdo-codesign.txt"
          grep -q 'Authority=Developer ID Application:' "$RUNNER_TEMP/lisdo-codesign.txt"
          grep -q 'Runtime Version=' "$RUNNER_TEMP/lisdo-codesign.txt"
          codesign -d --entitlements :- "$APP" > "$RUNNER_TEMP/lisdo-entitlements.plist"
          /usr/libexec/PlistBuddy -c 'Print :com.apple.security.app-sandbox' "$RUNNER_TEMP/lisdo-entitlements.plist" | grep -q true
          /usr/libexec/PlistBuddy -c 'Print :com.apple.security.network.client' "$RUNNER_TEMP/lisdo-entitlements.plist" | grep -q true
          /usr/libexec/PlistBuddy -c 'Print :com.apple.security.temporary-exception.mach-lookup.global-name' "$RUNNER_TEMP/lisdo-entitlements.plist" | grep -q 'com.yiwenwu.Lisdo.macOS-spks'
          /usr/libexec/PlistBuddy -c 'Print :com.apple.security.temporary-exception.mach-lookup.global-name' "$RUNNER_TEMP/lisdo-entitlements.plist" | grep -q 'com.yiwenwu.Lisdo.macOS-spki'
          /usr/libexec/PlistBuddy -c 'Print :SUFeedURL' "$APP/Contents/Info.plist" | grep -q '^https://lisdo.robertw.me/appcast.xml$'
          /usr/libexec/PlistBuddy -c 'Print :SUPublicEDKey' "$APP/Contents/Info.plist" | grep -q .
          /usr/libexec/PlistBuddy -c 'Print :SUEnableAutomaticChecks' "$APP/Contents/Info.plist" | grep -q true
          /usr/libexec/PlistBuddy -c 'Print :SUAutomaticallyUpdate' "$APP/Contents/Info.plist" | grep -q true
          /usr/libexec/PlistBuddy -c 'Print :SUAllowsAutomaticUpdates' "$APP/Contents/Info.plist" | grep -q true
          /usr/libexec/PlistBuddy -c 'Print :SUEnableInstallerLauncherService' "$APP/Contents/Info.plist" | grep -q true

      - name: Submit app bundle for notarization
        shell: bash
        run: |
          set -euo pipefail
          APP_VERSION="${RELEASE_VERSION#v}"
          APP_NOTARY_ZIP="$RUNNER_TEMP/Lisdo-${APP_VERSION}-app-notary.zip"
          APP_NOTARY_OUTPUT="$RUNNER_TEMP/app-notary-submit.json"
          rm -f "$APP_NOTARY_ZIP"
          /usr/bin/ditto -c -k --keepParent --sequesterRsrc --zlibCompressionLevel 9 "dist/Lisdo.app" "$APP_NOTARY_ZIP"

          set +e
          xcrun notarytool submit "$APP_NOTARY_ZIP" \
            --key "$RUNNER_TEMP/notary/AuthKey_${NOTARY_KEY_ID}.p8" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json | tee "$APP_NOTARY_OUTPUT"
          submit_status="${PIPESTATUS[0]}"
          set -e

          submission_id="$(ruby -rjson -e 'data = JSON.parse(File.read(ARGV[0])); print(data["id"].to_s)' "$APP_NOTARY_OUTPUT")"
          notary_status="$(ruby -rjson -e 'data = JSON.parse(File.read(ARGV[0])); print(data["status"].to_s)' "$APP_NOTARY_OUTPUT")"
          if [[ "$submit_status" != "0" || "$notary_status" != "Accepted" ]]; then
            echo "App notarization failed with status: ${notary_status:-unknown}" >&2
            if [[ -n "$submission_id" ]]; then
              xcrun notarytool log "$submission_id" \
                --key "$RUNNER_TEMP/notary/AuthKey_${NOTARY_KEY_ID}.p8" \
                --key-id "$NOTARY_KEY_ID" \
                --issuer "$NOTARY_ISSUER_ID" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi

      - name: Staple notarized app
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..6}; do
            if xcrun stapler staple "dist/Lisdo.app"; then
              break
            fi
            if [[ "$attempt" == "6" ]]; then
              echo "Failed to staple app after $attempt attempts." >&2
              exit 1
            fi
            echo "App notarization ticket is not available yet; retrying in 20 seconds."
            sleep 20
          done
          xcrun stapler validate "dist/Lisdo.app"
          spctl --assess --type execute --verbose=4 "dist/Lisdo.app"

      - name: Package release DMG
        shell: bash
        run: |
          set -euo pipefail
          export LISDO_APP_VERSION="${RELEASE_VERSION#v}"
          script/package_mac_release.sh

      - name: Developer ID sign DMG
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE="dist/release/Lisdo-${RELEASE_VERSION#v}.dmg"
          codesign --force --timestamp --sign "$DEVELOPER_ID_APPLICATION" "$PACKAGE"
          codesign --verify --verbose=4 "$PACKAGE"

      - name: Submit DMG for notarization
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE="dist/release/Lisdo-${RELEASE_VERSION#v}.dmg"
          DMG_NOTARY_OUTPUT="$RUNNER_TEMP/dmg-notary-submit.json"

          set +e
          xcrun notarytool submit "$PACKAGE" \
            --key "$RUNNER_TEMP/notary/AuthKey_${NOTARY_KEY_ID}.p8" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json | tee "$DMG_NOTARY_OUTPUT"
          submit_status="${PIPESTATUS[0]}"
          set -e

          submission_id="$(ruby -rjson -e 'data = JSON.parse(File.read(ARGV[0])); print(data["id"].to_s)' "$DMG_NOTARY_OUTPUT")"
          notary_status="$(ruby -rjson -e 'data = JSON.parse(File.read(ARGV[0])); print(data["status"].to_s)' "$DMG_NOTARY_OUTPUT")"
          if [[ "$submit_status" != "0" || "$notary_status" != "Accepted" ]]; then
            echo "DMG notarization failed with status: ${notary_status:-unknown}" >&2
            if [[ -n "$submission_id" ]]; then
              xcrun notarytool log "$submission_id" \
                --key "$RUNNER_TEMP/notary/AuthKey_${NOTARY_KEY_ID}.p8" \
                --key-id "$NOTARY_KEY_ID" \
                --issuer "$NOTARY_ISSUER_ID" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi

      - name: Staple notarized DMG and refresh checksum
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE="dist/release/Lisdo-${RELEASE_VERSION#v}.dmg"
          for attempt in {1..6}; do
            if xcrun stapler staple "$PACKAGE"; then
              break
            fi
            if [[ "$attempt" == "6" ]]; then
              echo "Failed to staple DMG after $attempt attempts." >&2
              exit 1
            fi
            echo "DMG notarization ticket is not available yet; retrying in 20 seconds."
            sleep 20
          done
          xcrun stapler validate "$PACKAGE"
          hdiutil verify "$PACKAGE"
          spctl --assess --type open --context context:primary-signature --verbose=4 "$PACKAGE"
          shasum -a 256 "$PACKAGE" > "$PACKAGE.sha256"

      - name: Sign DMG for Sparkle update validation
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE="dist/release/Lisdo-${RELEASE_VERSION#v}.dmg"
          KEY_FILE="$RUNNER_TEMP/sparkle-ed-private-key"
          SOURCE_PACKAGES="$PWD/dist/DerivedData/SourcePackages"
          SIGN_UPDATE=""
          if [[ -d "$SOURCE_PACKAGES" ]]; then
            SIGN_UPDATE="$(find "$SOURCE_PACKAGES" -type f -path "*/Sparkle/bin/sign_update" -print -quit)"
          fi

          if [[ -z "$SIGN_UPDATE" || ! -x "$SIGN_UPDATE" ]]; then
            echo "Sparkle sign_update tool was not found under dist/DerivedData/SourcePackages." >&2
            exit 1
          fi

          umask 077
          base64 --decode <<< "$SPARKLE_PRIVATE_ED_KEY_BASE64" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          if [[ ! -s "$KEY_FILE" ]]; then
            echo "Decoded Sparkle EdDSA private key is empty." >&2
            exit 1
          fi

          sign_output="$("$SIGN_UPDATE" --ed-key-file "$KEY_FILE" "$PACKAGE")"
          printf '%s\n' "$sign_output"

          signature="$(ruby -e 'input = STDIN.read; match = input.match(/sparkle:edSignature="([^"]+)"/); abort "Missing sparkle:edSignature in sign_update output" unless match; print match[1]' <<< "$sign_output")"
          if [[ -z "$signature" ]]; then
            echo "Sparkle edSignature is empty." >&2
            exit 1
          fi
          printf 'SPARKLE_ED_SIGNATURE=%s\n' "$signature" >> "$GITHUB_ENV"

      - name: Generate appcast
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${SPARKLE_ED_SIGNATURE:-}" ]]; then
            echo "SPARKLE_ED_SIGNATURE is missing. Sparkle update signing did not produce a signature." >&2
            exit 1
          fi

          APP_VERSION="${RELEASE_VERSION#v}"
          PACKAGE="dist/release/Lisdo-${APP_VERSION}.dmg"
          APPCAST="dist/release/appcast.xml"
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_VERSION}"
          DMG_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_VERSION}/Lisdo-${APP_VERSION}.dmg"
          RELEASE_NOTES=".github/releases/${RELEASE_VERSION}.md"

          args=(
            --version "$APP_VERSION"
            --build "$GITHUB_RUN_NUMBER"
            --release-url "$RELEASE_URL"
            --dmg-url "$DMG_URL"
            --dmg-path "$PACKAGE"
            --output "$APPCAST"
            --ed-signature "$SPARKLE_ED_SIGNATURE"
          )
          if [[ -f "$RELEASE_NOTES" ]]; then
            args+=(--release-notes-file "$RELEASE_NOTES")
          fi

          python3 script/generate_mac_appcast.py "${args[@]}"
          test -s "$APPCAST"

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PACKAGE="dist/release/Lisdo-${RELEASE_VERSION#v}.dmg"
          APPCAST="dist/release/appcast.xml"
          RELEASE_NOTES=".github/releases/${RELEASE_VERSION}.md"
          if gh release view "$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "GitHub Release $RELEASE_VERSION already exists."
          elif [[ -f "$RELEASE_NOTES" ]]; then
            gh release create "$RELEASE_VERSION" --draft --title "$RELEASE_VERSION" --notes-file "$RELEASE_NOTES"
          else
            gh release create "$RELEASE_VERSION" --draft --title "$RELEASE_VERSION" --notes "Lisdo ${RELEASE_VERSION}"
          fi
          gh release upload "$RELEASE_VERSION" "$PACKAGE" "$PACKAGE.sha256" "$APPCAST" --clobber

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release edit "$RELEASE_VERSION" --draft=false

      - name: Commit appcast to website source
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          GENERATED_APPCAST="$RUNNER_TEMP/generated-appcast.xml"
          cp dist/release/appcast.xml "$GENERATED_APPCAST"

          if [[ -z "${DEFAULT_BRANCH:-}" ]]; then
            echo "Default branch is not available from the GitHub event payload." >&2
            exit 1
          fi

          git fetch origin "+refs/heads/${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}"
          git checkout -B "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"

          cp "$GENERATED_APPCAST" Website/appcast.xml
          if git diff --quiet -- Website/appcast.xml; then
            echo "Website/appcast.xml already matches the generated appcast."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Website/appcast.xml

          staged_files="$(git diff --cached --name-only)"
          if [[ "$staged_files" != "Website/appcast.xml" ]]; then
            echo "Refusing to commit files other than Website/appcast.xml:" >&2
            printf '%s\n' "$staged_files" >&2
            exit 1
          fi

          git commit -m "chore: publish macOS appcast ${RELEASE_VERSION}"
          git push origin "HEAD:${DEFAULT_BRANCH}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lisdo-macos-${{ env.RELEASE_VERSION }}
          path: |
            dist/release/Lisdo-*.dmg
            dist/release/Lisdo-*.dmg.sha256
            dist/release/appcast.xml
          if-no-files-found: error
